<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employer Registration — Kamgar Connect</title>
  
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
/* ═══════════════════════════════════════════════════════════
   KAMGAR CONNECT — Premium Redesign v2
   Dark cinematic theme · Professional · Mobile-first
   ═══════════════════════════════════════════════════════════ */

/* ── Design Tokens ── */
:root {
  --bg-base:      #08080C;
  --bg-elevated:  #0F0F14;
  --bg-surface:   #16161D;
  --bg-hover:     #1E1E28;
  --border:       rgba(255, 255, 255, 0.06);
  --border-hover: rgba(255, 255, 255, 0.12);
  --text-primary: #F5F5F7;
  --text-secondary: #9CA3AF;
  --text-muted:   #6B7280;
  --accent:       #F97316;
  --accent-dark:  #EA580C;
  --accent-light: #FB923C;
  --amber:        #F59E0B;
  --green:        #22C55E;
  --red:          #EF4444;
  --gradient-brand: linear-gradient(135deg, #F97316 0%, #FBBF24 100%);
  --gradient-text: linear-gradient(90deg, #F97316, #F59E0B, #FBBF24);
  --gradient-hero: linear-gradient(135deg, #F97316 0%, #F59E0B 50%, #EF4444 100%);
  --radius-sm:    8px;
  --radius-md:    12px;
  --radius-lg:    20px;
  --radius-xl:    28px;
  --ease:         cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out:     cubic-bezier(0, 0, 0.2, 1);
  --font:         'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --max-w:        1200px;
}

/* ── Reset ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: var(--font);
  background: var(--bg-base);
  color: var(--text-primary);
  line-height: 1.65;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
a { text-decoration: none; color: inherit; }
ul, ol { list-style: none; }
img, video { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; }

/* ── Utility ── */
.text-gradient {
  background: var(--gradient-text);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.section-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  background: rgba(249, 115, 22, 0.06);
  border: 1px solid rgba(249, 115, 22, 0.12);
  padding: 6px 18px;
  border-radius: 100px;
  margin-bottom: 20px;
}

.section-header {
  text-align: center;
  margin-bottom: 56px;
}
.section-header h2 {
  font-size: clamp(1.6rem, 3.5vw, 2.6rem);
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -0.8px;
  margin-bottom: 14px;
}
.section-desc {
  font-size: 1rem;
  color: var(--text-secondary);
  max-width: 580px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ── Scroll Reveal ── */
.reveal {
  opacity: 0;
  visibility: hidden;
}

/* ═══════════════════════════════
   ANNOUNCEMENT BANNER
   ═══════════════════════════════ */
.announcement-banner {
  background: var(--gradient-brand);
  color: #000;
  text-align: center;
  padding: 10px 24px;
  font-weight: 800;
  font-size: 0.85rem;
  letter-spacing: 0.5px;
  position: relative;
  z-index: 1002;
  text-transform: uppercase;
}

/* ═══════════════════════════════
   NAVBAR
   ═══════════════════════════════ */
.navbar {
  position: fixed;
  top: 0; left: 0; width: 100%;
  z-index: 1000;
  background: rgba(8, 8, 12, 0.5);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border);
  transition: background 0.4s var(--ease-out), box-shadow 0.4s var(--ease-out);
}
.navbar.scrolled {
  background: rgba(8, 8, 12, 0.95);
  box-shadow: 0 1px 0 var(--border), 0 8px 40px rgba(0, 0, 0, 0.4);
}
.nav-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  height: 68px;
  gap: 24px;
}

/* Logo */
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.logo-icon {
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo-text {
  font-weight: 800;
  font-size: 1.12rem;
  color: var(--text-primary);
  letter-spacing: -0.4px;
}
.logo-highlight { color: var(--accent); }

/* Nav Links */
.nav-links {
  display: flex;
  gap: 32px;
  margin-left: auto;
}
.nav-links a {
  font-size: 0.84rem;
  font-weight: 500;
  color: var(--text-secondary);
  position: relative;
  transition: color 0.3s;
  padding: 4px 0;
}
.nav-links a:hover { color: var(--text-primary); }
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0;
  width: 0; height: 2px;
  background: var(--gradient-brand);
  border-radius: 1px;
  transition: width 0.35s var(--ease);
}
.nav-links a:hover::after { width: 100%; }

/* Nav Buttons */
.nav-actions {
  display: flex;
  gap: 10px;
  margin-left: auto;
}
.nav-btn-outline {
  font-size: 0.8rem;
  font-weight: 600;
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  border: 1px solid var(--border-hover);
  background: transparent;
  transition: all 0.25s var(--ease);
}
.nav-btn-outline:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
.nav-btn-fill {
  font-size: 0.8rem;
  font-weight: 600;
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: white;
  transition: all 0.25s var(--ease);
}
.nav-btn-fill:hover {
  background: var(--accent-dark);
  box-shadow: 0 4px 20px rgba(249, 115, 22, 0.3);
}

/* Hamburger */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  padding: 6px;
  z-index: 1001;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--text-primary);
  border-radius: 2px;
  transition: all 0.35s var(--ease);
  transform-origin: center;
}
.hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.active span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ═══════════════════════════════
   HERO
   ═══════════════════════════════ */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 140px 24px 80px;
  overflow: hidden;
}

.hero-bg-pattern {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
  background-size: 72px 72px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 20%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 20%, transparent 70%);
}

.hero-glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(140px);
  opacity: 0.18;
  pointer-events: none;
}
.hero-glow--left {
  width: 700px; height: 700px;
  background: var(--accent);
  top: -200px; left: -200px;
  animation: glowFloat 20s ease-in-out infinite;
}
.hero-glow--right {
  width: 500px; height: 500px;
  background: var(--amber);
  bottom: -100px; right: -120px;
  animation: glowFloat 25s ease-in-out infinite reverse;
}

@keyframes glowFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -40px) scale(1.05); }
  66% { transform: translate(-20px, 20px) scale(0.97); }
}

.hero-content {
  position: relative;
  z-index: 1;
  max-width: 780px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-secondary);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  padding: 7px 20px;
  border-radius: 100px;
  margin-bottom: 32px;
}
.badge-pulse {
  width: 7px; height: 7px;
  background: var(--green);
  border-radius: 50%;
  animation: pulseGlow 2s ease-in-out infinite;
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
  50% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
}

.hero h1 {
  font-size: clamp(2.4rem, 5.5vw, 3.8rem);
  font-weight: 800;
  line-height: 1.08;
  letter-spacing: -1.8px;
  margin-bottom: 24px;
}

.hero-subtitle {
  font-size: 1.08rem;
  color: var(--text-secondary);
  line-height: 1.75;
  max-width: 600px;
  margin: 0 auto 40px;
}

.hero-cta-row {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 0.92rem;
  border-radius: var(--radius-md);
  border: none;
  cursor: pointer;
  transition: all 0.3s var(--ease);
  padding: 15px 32px;
  text-decoration: none;
}
.btn-primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 8px 32px rgba(249, 115, 22, 0.25), 0 0 0 1px rgba(249, 115, 22, 0.1);
}
.btn-primary:hover {
  background: var(--accent-dark);
  transform: translateY(-2px);
  box-shadow: 0 12px 44px rgba(249, 115, 22, 0.35), 0 0 0 1px rgba(249, 115, 22, 0.2);
}
.btn-outline {
  background: transparent;
  color: var(--text-primary);
  border: 1px solid var(--border-hover);
}
.btn-outline:hover {
  background: var(--bg-hover);
  border-color: var(--text-muted);
}
.btn-full { width: 100%; justify-content: center; }

/* ── Stats Bar ── */
.hero-stats {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 40px;
  margin-top: 72px;
  padding: 28px 56px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: 0 16px 64px rgba(0, 0, 0, 0.3);
}
.stat-item { text-align: center; }
.stat-number {
  display: block;
  font-size: 1.5rem;
  font-weight: 800;
  background: var(--gradient-text);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stat-divider {
  width: 1px;
  height: 36px;
  background: var(--border-hover);
}

/* ═══════════════════════════════
   TRUST BAR
   ═══════════════════════════════ */
.trust-bar {
  padding: 28px 0;
  background: var(--bg-elevated);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.trust-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}
.trust-label {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
}
.trust-logos {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.trust-logo {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-secondary);
  padding: 6px 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.trust-dot {
  color: var(--text-muted);
  font-size: 0.8rem;
}

/* ═══════════════════════════════
   VIDEO SCRUBBER SECTION
   ═══════════════════════════════ */
.section-video {
  padding: 110px 0;
  background: var(--bg-base);
}
.section-video--alt {
  background: var(--bg-elevated);
}
.section-video-inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 24px;
}

/* Video Player */
.video-scrubber {
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: #000;
  border: 1px solid var(--border);
  box-shadow:
    0 32px 80px rgba(0, 0, 0, 0.6),
    0 0 0 1px rgba(255, 255, 255, 0.02) inset;
}

.vs-viewport {
  position: relative;
}
.vs-viewport video {
  width: 100%;
  display: block;
  aspect-ratio: 16 / 9;
  object-fit: cover;
}

/* Video Badges (Before/After) */
.vs-badges {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 20px;
  pointer-events: none;
}
.vs-badge {
  font-size: 0.68rem;
  font-weight: 800;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 6px 16px;
  border-radius: 6px;
  opacity: 0;
  transform: translateY(-12px);
  transition: all 0.5s var(--ease);
  backdrop-filter: blur(12px);
}
.vs-badge--before {
  background: rgba(239, 68, 68, 0.8);
  color: white;
}
.vs-badge--after {
  background: rgba(34, 197, 94, 0.8);
  color: white;
}
.vs-badge.active {
  opacity: 1;
  transform: translateY(0);
}

/* Play Hint Overlay */
.vs-play-hint {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 22px;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 100px;
  color: var(--text-secondary);
  font-size: 0.78rem;
  font-weight: 600;
  pointer-events: none;
  transition: opacity 0.5s var(--ease);
  animation: hintBob 2.5s ease-in-out infinite;
}
.vs-play-hint.hidden { opacity: 0; }

@keyframes hintBob {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-4px); }
}

/* ── Scrub Controls ── */
.vs-controls {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 24px 20px;
  background: var(--bg-surface);
  border-top: 1px solid var(--border);
}

.vs-time-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
  min-width: 36px;
  text-align: center;
  flex-shrink: 0;
}

.vs-track-wrapper {
  flex: 1;
}

.vs-track {
  position: relative;
  height: 6px;
  background: rgba(255, 255, 255, 0.06);
  border-radius: 3px;
  cursor: pointer;
  touch-action: none;
  user-select: none;
}
.vs-track::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 2px; height: 18px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 1px;
  pointer-events: none;
}

.vs-progress {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  width: 0%;
  background: var(--gradient-hero);
  border-radius: 3px;
  pointer-events: none;
}

.vs-thumb {
  position: absolute;
  top: 50%;
  left: 0%;
  transform: translate(-50%, -50%);
  width: 44px;
  height: 44px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 4px 15px rgba(249, 115, 22, 0.4), 0 0 0 1px rgba(255,255,255,0.5) inset;
  cursor: grab;
  z-index: 20;
  transition: box-shadow 0.2s, transform 0.15s;
  outline: none;
  animation: thumbGlowPulse 2s infinite;
}
@keyframes thumbGlowPulse {
  0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.6); }
  70% { box-shadow: 0 0 20px 10px rgba(249, 115, 22, 0); }
  100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
}
@keyframes thumbGlowPulse {
  0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.6); }
  70% { box-shadow: 0 0 20px 10px rgba(249, 115, 22, 0); }
  100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
}
.vs-thumb::after {
  content: '';
  position: absolute;
  inset: 12px;
  background: var(--accent);
  border-radius: 50%;
  pointer-events: none;
}
.vs-thumb:hover {
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5), 0 0 0 5px rgba(249, 115, 22, 0.3);
}
.vs-thumb:active,
.vs-thumb.dragging {
  cursor: grabbing;
  box-shadow: 0 2px 16px rgba(0, 0, 0, 0.6), 0 0 0 6px rgba(249, 115, 22, 0.4);
  transform: translate(-50%, -50%) scale(1.1);
  animation: pulseTouch 1.5s infinite;
}
@keyframes pulseTouch {
  0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.6); }
  70% { box-shadow: 0 0 0 15px rgba(249, 115, 22, 0); }
  100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
}

.vs-markers {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
  font-size: 0.66rem;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.vs-markers span:first-child { color: rgba(239, 68, 68, 0.5); }
.vs-marker-mid { color: rgba(255, 255, 255, 0.1); font-size: 0.5rem; }
.vs-markers span:last-child { color: rgba(34, 197, 94, 0.5); }

/* Impact Pill */
.impact-pill {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 36px;
  padding: 14px 28px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 0.88rem;
  color: var(--text-secondary);
  max-width: max-content;
  margin-left: auto;
  margin-right: auto;
}
.impact-pill strong { color: var(--amber); }

/* ═══════════════════════════════
   HOW IT WORKS
   ═══════════════════════════════ */
.section-process {
  padding: 110px 0;
  background: var(--bg-elevated);
}
.section-process-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 24px;
}

.steps-grid {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 0;
  flex-wrap: wrap;
}

.step-card {
  flex: 0 1 200px;
  text-align: center;
  padding: 28px 16px;
  position: relative;
}
.step-num {
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 16px;
}
.step-icon {
  width: 56px; height: 56px;
  margin: 0 auto 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(249, 115, 22, 0.06);
  border: 1px solid rgba(249, 115, 22, 0.12);
  border-radius: var(--radius-md);
  color: var(--accent);
  transition: all 0.35s var(--ease);
}
.step-card:hover .step-icon {
  background: rgba(249, 115, 22, 0.12);
  border-color: rgba(249, 115, 22, 0.25);
  transform: translateY(-4px);
}
.step-card h3 {
  font-size: 0.92rem;
  font-weight: 700;
  margin-bottom: 6px;
}
.step-card p {
  font-size: 0.82rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

.step-connector {
  display: flex;
  align-items: center;
  padding-top: 64px;
  color: var(--text-muted);
  opacity: 0.3;
  flex-shrink: 0;
}

/* ═══════════════════════════════
   CATEGORIES
   ═══════════════════════════════ */
.section-categories {
  padding: 110px 0;
  background: var(--bg-base);
}
.section-categories-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
}

.cat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

.cat-card {
  position: relative;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 32px 20px 28px;
  text-align: center;
  transition: all 0.35s var(--ease);
  cursor: pointer;
  overflow: hidden;
}
.cat-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(249, 115, 22, 0.06) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.4s;
}
.cat-card:hover::before { opacity: 1; }
.cat-card:hover {
  border-color: rgba(249, 115, 22, 0.25);
  transform: translateY(-6px);
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
}

.cat-icon-wrap {
  font-size: 2.4rem;
  margin-bottom: 14px;
  position: relative;
  transition: transform 0.35s var(--ease);
}
.cat-card:hover .cat-icon-wrap { transform: scale(1.12) translateY(-2px); }

.cat-card h3 {
  font-size: 0.92rem;
  font-weight: 700;
  margin-bottom: 4px;
  position: relative;
}
.cat-card p {
  font-size: 0.78rem;
  color: var(--text-muted);
  line-height: 1.5;
  position: relative;
  margin-bottom: 10px;
}
.cat-count {
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.3px;
  position: relative;
}

/* ═══════════════════════════════
   STORIES
   ═══════════════════════════════ */
.section-stories {
  padding: 110px 0;
  background: var(--bg-elevated);
}
.section-stories-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
}

.stories-carousel {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.story-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 36px 28px 30px;
  transition: all 0.35s var(--ease);
  display: flex;
  flex-direction: column;
}
.story-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-4px);
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.3);
}
.story-card--featured {
  border-color: rgba(249, 115, 22, 0.2);
  background: linear-gradient(145deg, var(--bg-surface) 0%, rgba(249, 115, 22, 0.02) 100%);
}

.story-stars {
  color: var(--amber);
  letter-spacing: 3px;
  font-size: 0.9rem;
  margin-bottom: 18px;
}
.story-card blockquote {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.75;
  font-style: italic;
  margin-bottom: 24px;
  flex: 1;
}
.story-footer {
  display: flex;
  align-items: center;
  gap: 12px;
}
.story-avatar-circle {
  width: 44px; height: 44px;
  background: var(--bg-hover);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}
.story-footer strong {
  display: block;
  font-size: 0.85rem;
  font-weight: 700;
}
.story-footer span {
  font-size: 0.72rem;
  color: var(--text-muted);
}

/* ═══════════════════════════════
   JOIN / CTA
   ═══════════════════════════════ */
.section-join {
  padding: 110px 0;
  background: var(--bg-base);
  position: relative;
  overflow: hidden;
}
.section-join::before {
  content: '';
  position: absolute;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(249, 115, 22, 0.06), transparent 70%);
  pointer-events: none;
}
.section-join-inner {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px;
  position: relative;
  z-index: 1;
}

.join-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

.join-card {
  border-radius: var(--radius-lg);
  padding: 44px 36px 40px;
  position: relative;
  overflow: hidden;
  transition: transform 0.35s var(--ease);
}
.join-card:hover { transform: translateY(-6px); }

.join-card--employer {
  background: linear-gradient(145deg, #F97316, #EA580C);
  color: white;
  box-shadow: 0 24px 64px rgba(249, 115, 22, 0.2);
}
.join-card--worker {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  color: var(--text-primary);
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.2);
}

.join-tag {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 5px 16px;
  border-radius: 100px;
  background: rgba(255, 255, 255, 0.2);
  margin-bottom: 20px;
}
.join-card--worker .join-tag {
  background: rgba(249, 115, 22, 0.08);
  color: var(--accent);
  border: 1px solid rgba(249, 115, 22, 0.15);
}

.join-card h3 {
  font-size: 1.35rem;
  font-weight: 800;
  margin-bottom: 8px;
}
.join-card > p {
  font-size: 0.88rem;
  opacity: 0.8;
  margin-bottom: 24px;
  line-height: 1.6;
}
.join-card ul {
  margin-bottom: 28px;
}
.join-card li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.84rem;
  padding: 6px 0;
  opacity: 0.9;
}
.join-card--employer .btn-primary {
  background: white;
  color: var(--accent-dark);
}
.join-card--employer .btn-primary:hover {
  background: #FFF7ED;
  box-shadow: 0 8px 28px rgba(0, 0, 0, 0.15);
}

/* ═══════════════════════════════
   FOOTER
   ═══════════════════════════════ */
.footer {
  background: #050508;
  border-top: 1px solid var(--border);
  padding: 72px 0 0;
}
.footer-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 24px;
}
.footer-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 40px;
  padding-bottom: 48px;
  border-bottom: 1px solid var(--border);
}
.footer-about {
  font-size: 0.85rem;
  color: var(--text-muted);
  line-height: 1.7;
  margin-top: 18px;
  max-width: 320px;
}
.footer-hindi {
  font-size: 0.82rem;
  color: var(--accent);
  opacity: 0.5;
  margin-top: 10px;
}
.footer-col h4 {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 18px;
}
.footer-col a {
  display: block;
  font-size: 0.84rem;
  color: var(--text-muted);
  padding: 5px 0;
  transition: color 0.25s;
}
.footer-col a:hover { color: var(--accent); }

.footer-bottom {
  padding: 24px 0;
  text-align: center;
}
.footer-location {
  font-size: 0.82rem;
  color: var(--accent-light);
  margin-bottom: 6px;
}
.footer-copy {
  font-size: 0.72rem;
  color: var(--text-muted);
}

/* ═══════════════════════════════
   UI ENHANCEMENTS
   ═══════════════════════════════ */

/* Scroll Progress */
.scroll-progress {
  position: fixed;
  top: 0; left: 0;
  height: 4px;
  background: var(--gradient-brand);
  width: 0%;
  z-index: 10000;
  transition: width 0.1s;
}

/* Page Wipe */
.page-wipe {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%; height: 0%;
  background: var(--accent);
  z-index: 10002;
  pointer-events: none;
}

/* Splash Screen */
.splash-screen {
  position: fixed;
  inset: 0;
  background: var(--bg-base);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.splash-logo {
  opacity: 0;
}

/* Custom Cursor */
@media (pointer: fine) {
  body, a, button, select, input, .vs-thumb { cursor: none !important; }
}
.custom-cursor {
  position: fixed;
  top: 0; left: 0;
  width: 12px; height: 12px;
  background: var(--accent);
  border-radius: 50%;
  pointer-events: none;
  z-index: 10001;
  transform: translate(-50%, -50%);
  transition: width 0.4s var(--ease), height 0.4s var(--ease), background 0.4s var(--ease);
  mix-blend-mode: screen;
}
.custom-cursor.hovering {
  width: 48px; height: 48px;
  background: rgba(255,255,255,0.8);
  mix-blend-mode: normal;
}
@media (hover: none) and (pointer: coarse) {
  .custom-cursor { display: none !important; }
}

/* Infinite Marquee */
.marquee-section {
  width: 100%;
  background: var(--accent);
  color: #000;
  padding: 16px 0;
  overflow: hidden;
  white-space: nowrap;
  display: flex;
  font-weight: 800;
  font-size: 0.95rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-top: 1px solid rgba(0,0,0,0.1);
  border-bottom: 1px solid rgba(0,0,0,0.1);
}
.marquee-track {
  display: flex;
  width: max-content;
  animation: marqueeScroll 35s linear infinite;
}
.marquee-track span {
  padding-right: 50px;
}
@keyframes marqueeScroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* 3D Flip Reveal */
.flip-reveal {
  display: inline-block;
  opacity: 0;
}

/* Hero Button Floating */
.hero-cta-row .btn {
  animation: floatBtn 6s ease-in-out infinite;
}
.hero-cta-row .btn-outline {
  animation-delay: -3s;
}
@keyframes floatBtn {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.hero-cta-row .btn:hover {
  animation-play-state: paused;
}

/* Particles */
.particles-container {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}
.particle {
  position: absolute;
  background: white;
  border-radius: 50%;
  opacity: 0.15;
  animation: particleFloat linear infinite;
}
@keyframes particleFloat {
  0% { transform: translateY(100vh) translateX(0); opacity: 0; }
  10% { opacity: 0.2; }
  90% { opacity: 0.2; }
  100% { transform: translateY(-20vh) translateX(100px); opacity: 0; }
}

/* Button Ripple */
.btn, .nav-btn-fill, .nav-btn-outline {
  position: relative;
  overflow: hidden;
}
.ripple {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  animation: rippleAnim 0.6s linear;
  background: rgba(255, 255, 255, 0.4);
  pointer-events: none;
  width: 100px;
  height: 100px;
  margin-top: -50px;
  margin-left: -50px;
}
@keyframes rippleAnim {
  to {
    transform: scale(4);
    opacity: 0;
  }
}

/* Floating WhatsApp Button */
.whatsapp-float {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 60px;
  height: 60px;
  background-color: #25d366;
  border-radius: 50px;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
  transition: all 0.3s var(--ease);
}
.whatsapp-float:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 28px rgba(37, 211, 102, 0.5);
}

/* Sticky Join Bar */
.sticky-join-bar {
  position: fixed;
  bottom: -100px;
  left: 0;
  width: 100%;
  background: rgba(15, 15, 20, 0.95);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: 14px 24px;
  z-index: 900;
  transition: bottom 0.5s var(--ease);
  display: flex;
  justify-content: center;
}
.sticky-join-bar.visible {
  bottom: 0;
}
.sjb-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: var(--max-w);
  gap: 20px;
}
.sjb-inner span {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
}
.sjb-actions {
  display: flex;
  gap: 12px;
}
.sjb-actions .btn {
  padding: 10px 20px;
  font-size: 0.8rem;
}

/* ═══════════════════════════════
   RESPONSIVE — TABLET
   ═══════════════════════════════ */
@media (max-width: 1024px) {
  .cat-grid { grid-template-columns: repeat(3, 1fr); }
  .steps-grid { gap: 0; }
  .step-card { flex: 0 1 160px; padding: 20px 10px; }
  .step-connector { display: none; }
  .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
}

/* ═══════════════════════════════
   RESPONSIVE — MOBILE
   ═══════════════════════════════ */
@media (max-width: 768px) {
  /* Nav */
  .nav-links, .nav-actions { display: none; }
  .hamburger { display: flex; }

  .nav-links.open {
    display: flex;
    flex-direction: column;
    position: fixed;
    inset: 0;
    background: rgba(8, 8, 12, 0.97);
    backdrop-filter: blur(24px);
    z-index: 999;
    justify-content: center;
    align-items: center;
    gap: 28px;
  }
  .nav-links.open a {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text-primary);
  }
  .nav-actions.open {
    display: flex;
    flex-direction: column;
    position: fixed;
    bottom: 64px;
    left: 50%; transform: translateX(-50%);
    z-index: 999;
    gap: 12px;
    align-items: center;
  }

  /* Hero */
  .hero { min-height: auto; padding: 120px 20px 60px; }
  .hero h1 { font-size: 2rem; letter-spacing: -0.5px; }
  .hero-subtitle { font-size: 0.95rem; }
  .hero-cta-row {
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .hero-cta-row .btn { width: 100%; max-width: 320px; justify-content: center; }
  .hero-stats {
    flex-direction: column;
    gap: 16px;
    padding: 24px;
    margin-top: 48px;
  }
  .stat-divider { width: 60px; height: 1px; }

  /* Trust */
  .trust-inner { flex-direction: column; gap: 12px; }
  .trust-logos { gap: 8px; }
  .trust-dot { display: none; }

  /* Steps */
  .steps-grid {
    flex-direction: column;
    align-items: center;
  }
  .step-card { flex: none; width: 100%; max-width: 320px; }
  .step-connector { display: none; }

  /* Categories */
  .cat-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }

  /* Stories */
  .stories-carousel { grid-template-columns: 1fr; }

  /* Join */
  .join-grid { grid-template-columns: 1fr; }
  .join-card { padding: 36px 28px 32px; }

  /* Footer */
  .footer-grid { grid-template-columns: 1fr; text-align: center; }
  .footer-about { margin: 18px auto 0; }

  /* Extras */
  .whatsapp-float { bottom: 120px; right: 20px; width: 50px; height: 50px; }
  .whatsapp-float svg { width: 24px; height: 24px; }
  .sjb-inner { flex-direction: column; text-align: center; gap: 12px; }
  .sjb-actions { width: 100%; }
  .sjb-actions .btn { flex: 1; justify-content: center; }

  /* Video */
  .section-header h2 { font-size: 1.3rem; }
  .vs-badge { font-size: 0.58rem; padding: 4px 10px; }
  .vs-badges { padding: 12px; }
  .vs-thumb { width: 18px; height: 18px; }
  .vs-controls { padding: 14px 16px 16px; gap: 10px; }
  .vs-time-label { font-size: 0.65rem; min-width: 30px; }
  .vs-play-hint { font-size: 0.7rem; padding: 8px 16px; }
}

@media (max-width: 480px) {
  .hero h1 { font-size: 1.65rem; }
  .cat-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .cat-card { padding: 24px 14px 22px; }
}
/* ── Ripple Effect ── */
.ripple {
  position: absolute;
  background: rgba(255, 255, 255, 0.4);
  transform: translate(-50%, -50%);
  pointer-events: none;
  border-radius: 50%;
  animation: rippleScale 0.6s linear;
}
@keyframes rippleScale {
  from { width: 0; height: 0; opacity: 0.5; }
  to { width: 400px; height: 400px; opacity: 0; }
}

/* ═══════════════════════════════════════════
   LANGUAGE SELECTOR GATEWAY
   ═══════════════════════════════════════════ */
#lang-gate {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg-1);
  z-index: 10001; /* Above everything */
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.lang-gate-content {
  text-align: center;
  max-width: 400px;
  width: 90%;
}

.lang-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  padding: 20px;
  margin-bottom: 15px;
  background: var(--bg-2);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  color: var(--text-primary);
  font-size: 1.2rem;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
}

.lang-btn:hover {
  background: var(--orange-dark);
  border-color: var(--orange-primary);
  transform: translateY(-2px);
}

.lang-btn span.flag {
  font-size: 2rem;
  margin-bottom: 5px;
}

.lang-btn span.num {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  font-size: 1.5rem;
  opacity: 0.5;
}

.lang-btn small {
  display: block;
  font-size: 0.9rem;
  color: var(--text-secondary);
  margin-top: 8px;
}

/* ═══════════════════════════════════════════
   VOICE ASSISTANT PANEL
   ═══════════════════════════════════════════ */
.voice-fab {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 60px;
  height: 60px;
  background: var(--orange-primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  cursor: pointer;
  z-index: 999;
  box-shadow: 0 4px 20px rgba(255,102,0,0.4);
  animation: pulse-orange 2s infinite;
  transition: transform 0.3s ease;
}

.voice-fab:hover {
  transform: scale(1.1);
}

.voice-panel {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 350px;
  height: 450px;
  max-height: 80vh;
  background: var(--bg-2);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  transform: translateY(120%);
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  pointer-events: none;
}

.voice-panel.open {
  transform: translateY(0);
  opacity: 1;
  pointer-events: all;
}

@media (max-width: 400px) {
  .voice-panel {
    bottom: 0px;
    left: 0px;
    width: 100%;
    border-radius: 20px 20px 0 0;
    max-height: 90vh;
  }
}

.voice-header {
  padding: 15px 20px;
  background: rgba(0,0,0,0.3);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border-color);
}

.voice-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  color: white;
}

.mitra-wave {
  width: 12px;
  height: 12px;
  background: var(--orange-primary);
  border-radius: 50%;
}
.mitra-wave.talking {
  animation: wavePulse 0.5s infinite alternate;
}

@keyframes wavePulse {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(1.8); opacity: 1; box-shadow: 0 0 10px var(--orange-primary); }
}

.voice-header-right {
  display: flex;
  align-items: center;
  gap: 15px;
}

.lang-badge {
  font-size: 1.2rem;
}

.voice-close {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 1.5rem;
  cursor: pointer;
  transition: color 0.3s;
}
.voice-close:hover {
  color: white;
}

.voice-chat-history {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.chat-bubble {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 15px;
  font-size: 0.95rem;
  line-height: 1.4;
}

.chat-bubble.user {
  align-self: flex-end;
  background: var(--bg-1);
  border: 1px solid var(--border-color);
  border-bottom-right-radius: 2px;
}

.chat-bubble.mitra {
  align-self: flex-start;
  background: rgba(255, 102, 0, 0.1);
  border: 1px solid rgba(255, 102, 0, 0.3);
  color: white;
  border-bottom-left-radius: 2px;
}

.chat-bubble.loading {
  font-style: italic;
  opacity: 0.7;
}

.voice-controls {
  padding: 15px;
  border-top: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(0,0,0,0.2);
}

.voice-transcript {
  flex: 1;
  font-size: 0.9rem;
  color: var(--text-secondary);
  min-height: 20px;
}

.mic-btn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: var(--bg-1);
  border: 1px solid var(--border-color);
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;

const dictionary = {

let currentLang = localStorage.getItem('kamgar-lang');

function applyTranslations(lang) {
  currentLang = lang;
  localStorage.setItem('kamgar-lang', lang);

  // Automatically parse entire DOM for exact matches
  const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
  let node;
  const nodesToUpdate = [];

  while (node = walker.nextNode()) {
    const parent = node.parentElement;
    if (parent && (parent.tagName === 'SCRIPT' || parent.tagName === 'STYLE')) continue;
    
    let originalText = parent.getAttribute('data-original-text');
    if (!originalText) {
      originalText = node.nodeValue.trim();
      if (dictionary[originalText]) {
        parent.setAttribute('data-original-text', originalText);
      }
    }

    if (originalText && dictionary[originalText]) {
      nodesToUpdate.push({ node, text: dictionary[originalText][lang] || originalText });
    }
  }

  nodesToUpdate.forEach(item => {
    item.node.nodeValue = item.text;
  });
}

function initLanguageGate() {
  if (currentLang) {
    applyTranslations(currentLang);
    return;
  }

  // Create Gateway Overlay
  const gate = document.createElement('div');
  gate.id = 'lang-gate';
  gate.innerHTML = `
    <div class="lang-gate-content">
      <h1 style="color:white; margin-bottom: 40px; font-size: 2rem;">Select Language</h1>
      <button class="lang-btn" onclick="selectLang('en')">
        <span class="flag">🇬🇧</span>

        <small>Welcome to Kamgar Connect</small>
      </button>
      <button class="lang-btn" onclick="selectLang('mr')">
        <span class="flag">🟠</span> 
        <span class="num">2</span> मराठी
        <small>कामगार कनेक्टमध्ये आपले स्वागत आहे</small>
      </button>
      <button class="lang-btn" onclick="selectLang('hi')">
        <span class="flag">🇮🇳</span> 
        <span class="num">3</span> हिंदी
        <small>कामगार कनेक्ट में आपका स्वागत है</small>
      </button>
    </div>
  `;
  document.body.appendChild(gate);

  // Keyboard support (1, 2, 3 keys)
  window.addEventListener('keydown', handleLangKey);
}

function handleLangKey(e) {
  if (e.key === '1') selectLang('en');
  if (e.key === '2') selectLang('mr');
  if (e.key === '3') selectLang('hi');
}

window.selectLang = function(lang) {
  applyTranslations(lang);
  window.removeEventListener('keydown', handleLangKey);
  
  const gate = document.getElementById('lang-gate');
  if (gate && typeof window.gsap !== 'undefined') {
    // Animate out with GSAP Wipe 
    window.gsap.to(gate, {
      opacity: 0,
      y: -50,
      duration: 0.6,

        gate.remove();
        // Initialize Speech Recog if voice panel exists
        if(typeof initVoicePanel === 'function') initVoicePanel(lang);
      }
    });
  } else if (gate) {
    gate.remove();
    if(typeof initVoicePanel === 'function') initVoicePanel(lang);
  }
};

// Create and inject the offline banner once

// Watch for network changes
window.addEventListener('online', retrySavedRegistrations);
window.addEventListener('offline', showOfflineBanner);

function showOfflineBanner() {
  const banner = document.getElementById('offline-banner');
  if (banner) {
    banner.style.display = 'block';
    // Remove auto-hide to keep it visible while backend is down
  }
}

function hideOfflineBanner() {
  const banner = document.getElementById('offline-banner');
  if (banner) {
    banner.style.display = 'none';
  }
}

async function isBackendOnline() {
  try {
    const res = await fetch(`${CONFIG.BACKEND_URL}/api/health`, { timeout: 4000 });
    const data = await res.json();
    if (data.status === 'ok') {
      hideOfflineBanner();
      return true;
    }
    return false;
  } catch (e) {
    return false;
  }
}

async function checkHealthAndSubmit(submitFunction, fallbackData, type) {
  const isOnline = await isBackendOnline();
  
  if (isOnline) {
    await submitFunction();
  } else {
    showOfflineBanner();
    saveToLocal(fallbackData, type);
  }
}

function saveToLocal(data, type) {
  const pending = JSON.parse(localStorage.getItem('pending_registrations') || '[]');
  pending.push({ data, type, time: Date.now() });
  localStorage.setItem('pending_registrations', JSON.stringify(pending));
  
  // Show a clearer message to the user
  console.log('Backend offline. Saved to localStorage:', type);
}

async function retrySavedRegistrations() {
  const pending = JSON.parse(localStorage.getItem('pending_registrations') || '[]');
  if (pending.length === 0) return;

  const isOnline = await isBackendOnline();
  if (!isOnline) return;

  const remaining = [];
  
  for (const item of pending) {
    try {
      const endpoint = item.type === 'worker' ? '/api/register/worker' : '/api/register/employer';
      const res = await fetch(`${CONFIG.BACKEND_URL}${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(item.data)
      });
      if (!res.ok) {
        remaining.push(item);
      }
    } catch(e) {
      remaining.push(item);
    }
  }

  if (remaining.length < pending.length) {
    console.log(`Successfully synced ${pending.length - remaining.length} saved registrations.`);
  }
  
  localStorage.setItem('pending_registrations', JSON.stringify(remaining));
}

let recognition;
let currentTranscript = "";
let isRecording = false;

function initVoicePanel(languageOverride) {
  const lang = languageOverride || localStorage.getItem('kamgar-lang') || 'en';
  
  document.getElementById('mitra-lang-badge').innerText = lang === 'mr' ? '🟠' : lang === 'hi' ? '🇮🇳' : '🇬🇧';
  
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    console.warn("Speech API not supported in this browser");
    document.getElementById('voice-transcript').innerText = "Speech API Not Supported";
    return;
  }
  
  recognition = new SpeechRecognition();
  recognition.lang = lang === 'mr' ? 'mr-IN' : lang === 'hi' ? 'hi-IN' : 'en-IN';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; ++i) {
      if (event.results[i].isFinal) {
        currentTranscript += event.results[i][0].transcript;
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    document.getElementById('voice-transcript').innerText = currentTranscript + interim;
    document.getElementById('mitra-wave').classList.add('talking');
  };

  recognition.onend = () => {
    isRecording = false;
    document.getElementById('mitra-wave').classList.remove('talking');
    document.getElementById('mic-btn').classList.remove('active');
    
    if (currentTranscript.trim().length > 0) {
      sendToGemini(currentTranscript.trim(), lang);
      currentTranscript = "";
    } else {
      document.getElementById('voice-transcript').innerText = "Tap mic to speak...";
    }
  };
}

async function sendToGemini(text, lang) {
  const chatHistory = document.getElementById('voice-chat-history');
  
  const chatBubble = document.createElement('div');
  chatBubble.className = 'chat-bubble user';
  chatBubble.innerText = text;
  chatHistory.appendChild(chatBubble);
  
  const loadingBubble = document.createElement('div');
  loadingBubble.className = 'chat-bubble mitra loading';
  loadingBubble.innerText = 'Typing...';
  chatHistory.appendChild(loadingBubble);
  
  chatHistory.scrollTop = chatHistory.scrollHeight;

  try {
    const response = await fetch(`${CONFIG.BACKEND_URL}/api/assistant/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: [] })
    });
    
    const data = await response.json();
    loadingBubble.innerText = data.reply;
    loadingBubble.classList.remove('loading');
    chatHistory.scrollTop = chatHistory.scrollHeight;
    
    playTTS(data.reply, lang);
  } catch(err) {
    loadingBubble.innerText = "Error reaching Mitra.";
    loadingBubble.classList.remove('loading');
  }
}

async function playTTS(text, lang) {
  try {
    const response = await fetch(`${CONFIG.BACKEND_URL}/api/assistant/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, language: lang })
    });
    
    if (!response.ok) throw new Error('Proxy fallback');
    
    const blob = await response.blob();
    const audioUrl = URL.createObjectURL(blob);
    new Audio(audioUrl).play();
  } catch(err) {
    // Fallback to Web Speech API
    const synth = window.speechSynthesis;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = lang === 'mr' ? 'mr-IN' : lang === 'hi' ? 'hi-IN' : 'en-IN';
    synth.speak(utterance);
  }
}

// UI bindings
document.addEventListener('DOMContentLoaded', () => {
  const micFab = document.getElementById('voice-fab');
  const panel = document.getElementById('voice-panel');
  const closeBtn = document.getElementById('voice-close');
  const micBtn = document.getElementById('mic-btn');
  
  if(micFab) {
    micFab.addEventListener('click', () => {
      panel.classList.add('open');
      if(!recognition) initVoicePanel();
    });
  }
  
  if(closeBtn) {
    closeBtn.addEventListener('click', () => {
      panel.classList.remove('open');
    });
  }
  
  if(micBtn) {
    micBtn.addEventListener('click', () => {
      if(!recognition) return;
      if(isRecording) {
        recognition.stop();
      } else {
        currentTranscript = "";
        document.getElementById('voice-transcript').innerText = "Listening...";
        recognition.start();
        isRecording = true;
        micBtn.classList.add('active');
        document.getElementById('mitra-wave').classList.add('talking');
      }
    });
  }
});

/* ═══════════════════════════════════════════
   DRAG-TO-SCRUB VIDEO SLIDER
   The user drags the thumb to scrub through
   the video at their own pace.
   ═══════════════════════════════════════════ */
function initVideoScrubber(videoId, trackId, fillId, thumbId, badgeBeforeId, badgeAfterId) {
  const video = document.getElementById(videoId);
  const track = document.getElementById(trackId);
  const fill  = document.getElementById(fillId);
  const thumb = document.getElementById(thumbId);
  const labelBefore = document.getElementById(badgeBeforeId);
  const labelAfter  = document.getElementById(badgeAfterId);

  let isDragging = false;
  let videoReady = false;

  // Set SRC from remote bucket if configs exist
  if (videoId === 'vid-chowk' && typeof CONFIG !== 'undefined' && CONFIG.CHOWK_VIDEO) {
    video.src = CONFIG.CHOWK_VIDEO;
  }
  if (videoId === 'vid-home' && typeof CONFIG !== 'undefined' && CONFIG.HOME_VIDEO) {
    video.src = CONFIG.HOME_VIDEO;
  }

  // Pause video — user controls via scrubbing
  video.pause();

  // When video metadata is loaded, set to start
  video.addEventListener('loadedmetadata', () => {
    videoReady = true;
    video.currentTime = 0;
    updateVisuals(0);
  });

  // Also handle if already loaded
  if (video.readyState >= 1) {
    videoReady = true;
    video.currentTime = 0;
    updateVisuals(0);
  }

  // ── Pointer events for drag ──
  function onPointerDown(e) {
    isDragging = true;
    thumb.classList.add('dragging');
    document.body.style.userSelect = 'none';
    video.play().catch(() => {}); // Play while dragging
    scrubTo(e);
  }

  function onPointerMove(e) {
    if (!isDragging) return;
    video.play().catch(() => {}); // Ensure continuous play while moving
    scrubTo(e);
  }

  function onPointerUp() {
    if (!isDragging) return;
    isDragging = false;
    thumb.classList.remove('dragging');
    document.body.style.userSelect = '';
    video.pause();
  }

  // Track click
  track.addEventListener('pointerdown', onPointerDown);
  thumb.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    onPointerDown(e);
  });

  document.addEventListener('pointermove', onPointerMove);
  document.addEventListener('pointerup', onPointerUp);

  // Touch events for mobile
  track.addEventListener('touchstart', (e) => {
    isDragging = true;
    thumb.classList.add('dragging');
    scrubToTouch(e);
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    scrubToTouch(e);
  }, { passive: true });

  document.addEventListener('touchend', () => {
    if (!isDragging) return;
    isDragging = false;
    thumb.classList.remove('dragging');
    video.pause();
  });

  // Keyboard support (arrow keys)
  thumb.addEventListener('keydown', (e) => {
    if (!videoReady || !video.duration) return;
    const step = video.duration * 0.02; // 2% per keypress
    if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
      e.preventDefault();
      video.currentTime = Math.min(video.duration, video.currentTime + step);
      updateVisuals(video.currentTime / video.duration);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
      e.preventDefault();
      video.currentTime = Math.max(0, video.currentTime - step);
      updateVisuals(video.currentTime / video.duration);
    }
  });

  // ── Scrub to pointer position ──
  function scrubTo(e) {
    if (!videoReady || !video.duration) return;
    const rect = track.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const pct = Math.max(0, Math.min(1, x / rect.width));

    video.currentTime = pct * video.duration;
    video.play().catch(() => {});
    updateVisuals(pct);
  }

  // ── Scrub to touch position ──
  function scrubToTouch(e) {
    if (!videoReady || !video.duration || !e.touches.length) return;
    const rect = track.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    const pct = Math.max(0, Math.min(1, x / rect.width));

    video.currentTime = pct * video.duration;
    video.play().catch(() => {});
    updateVisuals(pct);
  }

  // ── Update visuals ──
  function updateVisuals(pct) {
    const percent = pct * 100;
    fill.style.width = `${percent}%`;
    thumb.style.left = `${percent}%`;

    // Toggle before/after labels at midpoint
    if (labelBefore && labelAfter) {
      if (pct < 0.5) {
        labelBefore.classList.add('active');
        labelAfter.classList.remove('active');
      } else {
        labelBefore.classList.remove('active');
        labelAfter.classList.add('active');
      }
    }
  }
}

/* ═══════════════════════════════════════════
   NAVBAR — Scroll effect
   ═══════════════════════════════════════════ */
function initNavbar() {
  const nav = document.getElementById('navbar');
  if (!nav) return;

  const check = () => {
    nav.classList.toggle('scrolled', window.scrollY > 40);
  };

  window.addEventListener('scroll', check, { passive: true });
  check();
}

/* ═══════════════════════════════════════════
   HAMBURGER — Mobile menu toggle
   ═══════════════════════════════════════════ */
function initHamburger() {
  const burger = document.getElementById('hamburger');
  const links  = document.getElementById('nav-links');
  const ctas   = document.getElementById('nav-ctas');
  if (!burger || !links) return;

  burger.addEventListener('click', () => {
    const isOpen = links.classList.toggle('open');
    burger.classList.toggle('active');
    if (ctas) ctas.classList.toggle('open');
    document.body.style.overflow = isOpen ? 'hidden' : '';

    // Mobile GSAP Stagger effect for links
    if (isOpen && typeof gsap !== 'undefined') {
      const menuItems = links.querySelectorAll('a');
      gsap.fromTo(menuItems, 
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: 0.4, stagger: 0.1, ease: 'power2.out' }
      );
      if (ctas) {
        gsap.fromTo(ctas.querySelectorAll('a'),
          { opacity: 0, y: 20 },
          { opacity: 1, y: 0, duration: 0.4, stagger: 0.1, delay: 0.3, ease: 'power2.out' }
        );
      }
    }
  });

  // Close on link click
  links.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      links.classList.remove('open');
      burger.classList.remove('active');
      if (ctas) ctas.classList.remove('open');
      document.body.style.overflow = '';
    });
  });
}

/* ═══════════════════════════════════════════
   SMOOTH SCROLL
   ═══════════════════════════════════════════ */
function initSmoothScroll() {
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', (e) => {
      const id = anchor.getAttribute('href');
      if (id === '#') return;
      const target = document.querySelector(id);
      if (!target) return;
      e.preventDefault();

      const offset = document.querySelector('.navbar')?.offsetHeight || 64;
      const top = target.getBoundingClientRect().top + window.scrollY - offset;

      window.scrollTo({ top, behavior: 'smooth' });
    });
  });
}

/* ═══════════════════════════════════════════
   SCROLL REVEAL — IntersectionObserver
   ═══════════════════════════════════════════ */
function initRevealAnimations() {
  const els = document.querySelectorAll('.reveal');
  if (!els.length) return;

  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    },
    { threshold: 0.12, rootMargin: '0px 0px -30px 0px' }
  );

  els.forEach(el => observer.observe(el));
}

/* ═══════════════════════════════════════════
   3D TILT EFFECT
   ═══════════════════════════════════════════ */
function init3DTilt() {
  const cards = document.querySelectorAll('.cat-card, .story-card');
  cards.forEach(card => {
    // Add transition for smooth return
    card.style.transition = 'transform 0.1s, box-shadow 0.1s';
    
    card.addEventListener('mousemove', e => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const rotateX = ((y - centerY) / centerY) * -8;
      const rotateY = ((x - centerX) / centerX) * 8;
      
      card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.transition = 'transform 0.4s ease-out, box-shadow 0.4s ease-out';
      card.style.transform = '';
      setTimeout(() => {
        card.style.transition = 'transform 0.1s, box-shadow 0.1s';
      }, 400);
    });
  });
}

/* ═══════════════════════════════════════════
   HERO PARALLAX & PARTICLES
   ═══════════════════════════════════════════ */
function initHeroParallax() {
  const hero = document.getElementById('hero');
  const bg = document.querySelector('.hero-bg-pattern');
  const glowL = document.querySelector('.hero-glow--left');
  const glowR = document.querySelector('.hero-glow--right');
  const ctaBtns = document.querySelector('.hero-cta-row');
  
  if (!hero) return;
  
  // Parallax Effect
  hero.addEventListener('mousemove', e => {
    const { clientX, clientY } = e;
    const x = (clientX / window.innerWidth - 0.5) * 20;
    const y = (clientY / window.innerHeight - 0.5) * 20;
    
    if (bg) bg.style.transform = `translate(${x}px, ${y}px)`;
    if (glowL) glowL.style.transform = `translate(${x * 1.5}px, ${y * 1.5}px)`;
    if (glowR) glowR.style.transform = `translate(${-x * 1.5}px, ${-y * 1.5}px)`;
    if (ctaBtns) ctaBtns.style.transform = `translate(${-x * 0.5}px, ${-y * 0.5}px)`;
  });

  // Inject CSS Particles
  const particleContainer = document.createElement('div');
  particleContainer.className = 'particles-container';
  hero.insertBefore(particleContainer, hero.firstChild);

  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.width = Math.random() * 4 + 1 + 'px';
    p.style.height = p.style.width;
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = Math.random() * 100 + 'vh';
    p.style.animationDuration = Math.random() * 20 + 10 + 's';
    p.style.animationDelay = Math.random() * -20 + 's';
    particleContainer.appendChild(p);
  }
}

/* ═══════════════════════════════════════════
   ANIMATED COUNTERS
   ═══════════════════════════════════════════ */
function initCounters() {
  // Select .stat-number and also numbers with 3D flip class
  const counters = document.querySelectorAll('.stat-number');
  if (!counters.length) return;

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible'); // Trigger flip reveal if applied
        animateCounter(entry.target);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.5 });

  counters.forEach(c => observer.observe(c));

  function animateCounter(el) {
    const targetText = el.getAttribute('data-count');
    if (!targetText) return;
    const target = parseInt(targetText, 10);
    if (isNaN(target)) return;
    
    const duration = 2000;
    const frameRate = 1000 / 60;
    const totalFrames = Math.round(duration / frameRate);
    let frame = 0;

    const easeOutQuad = t => t * (2 - t);
    
    const counterInterval = setInterval(() => {
      frame++;
      const progress = easeOutQuad(frame / totalFrames);
      const current = Math.round(target * progress);
      
      let suffix = '';
      if (target >= 1000) {
        if (target % 1000 === 0) {
          suffix = 'K+';
          el.innerText = (current / 1000).toFixed(1).replace('.0', '') + suffix;
        } else {
          el.innerText = current.toLocaleString('en-IN') + '+';
        }
      } else {
         el.innerText = current.toLocaleString('en-IN') + '+';
      }
      
      if (frame === totalFrames) {
        clearInterval(counterInterval);
        // Set final exact text
        if (targetText === '5000') el.innerText = '5K+';
        else if (targetText === '10000') el.innerText = '10,000+';
        else el.innerText = target.toLocaleString('en-IN') + '+';
      }
    }, frameRate);
  }
}

/* ═══════════════════════════════════════════
   BUTTON RIPPLE EFFECT
   ═══════════════════════════════════════════ */
function initButtonRipple() {
  const buttons = document.querySelectorAll('.btn, .nav-btn-fill, .nav-btn-outline');
  buttons.forEach(btn => {
    btn.addEventListener('click', function(e) {
      const rect = e.target.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      
      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });
  });
}

/* ═══════════════════════════════════════════
   SCROLL PROGRESS & STICKY JOIN BAR
   ═══════════════════════════════════════════ */
function initScrollUI() {
  const progress = document.getElementById('scroll-progress');
  const stickyBar = document.getElementById('sticky-join-bar');
  const hero = document.getElementById('hero');
  
  window.addEventListener('scroll', () => {
    const scrollPos = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    
    // Progress Bar
    if (progress) {
      const scrollPercent = (scrollPos / docHeight) * 100;
      progress.style.width = scrollPercent + '%';
    }
    
    // Sticky Bar
    if (stickyBar && hero) {
      const heroHeight = hero.offsetHeight;
      if (scrollPos > heroHeight) {
        stickyBar.classList.add('visible');
      } else {
        stickyBar.classList.remove('visible');
      }
    }
  }, { passive: true });
}

/* ═══════════════════════════════════════════
   GSAP CUSTOM CURSOR
   ═══════════════════════════════════════════ */
function initCustomCursor() {
  const cursor = document.getElementById('custom-cursor');
  if (!cursor) return;

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let cursorX = mouseX;
  let cursorY = mouseY;

  // Track mouse
  window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  // Smooth follow via GSAP ticker
  gsap.ticker.add(() => {
    // Lerp (easing) factor 0.2
    cursorX += (mouseX - cursorX) * 0.2;
    cursorY += (mouseY - cursorY) * 0.2;
    gsap.set(cursor, { x: cursorX, y: cursorY });
  });

  // Hover states
  const hoverTargets = document.querySelectorAll('a, button, .btn, .nav-btn-fill, .nav-btn-outline, .vs-thumb');
  hoverTargets.forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
  });
}

/* ═══════════════════════════════════════════
   MAGNETIC BUTTONS
   ═══════════════════════════════════════════ */
function initMagneticButtons() {
  const magnets = document.querySelectorAll('.btn, .nav-btn-fill, .nav-btn-outline');
  magnets.forEach(btn => {
    btn.addEventListener('mousemove', (e) => {
      const rect = btn.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width / 2;
      const y = e.clientY - rect.top - rect.height / 2;
      
      gsap.to(btn, {
        duration: 0.3,
        x: x * 0.3,
        y: y * 0.3,
        ease: 'power2.out'
      });
    });
    
    btn.addEventListener('mouseleave', () => {
      gsap.to(btn, {
        duration: 0.7,
        x: 0,
        y: 0,
        ease: 'elastic.out(1, 0.3)'
      });
    });
  });
}

/* ═══════════════════════════════════════════
   SPLASH SCREEN & HERO GSAP
   ═══════════════════════════════════════════ */
function initSplashAndHeroGSAP() {
  const tl = gsap.timeline();
  
  // Setup Splash Logo
  gsap.set('.splash-logo', { opacity: 0, scale: 0.8 });
  
  // Custom manual Text Splitter for the Hero H1
  const h1 = document.querySelector('.hero-content h1');
  if (h1) {
    // We split lines initially to retain breaks, then split words
    const htmlObj = h1.innerHTML.split('<br>').map(line => {
      return line.split(' ').map(word => {
        if (!word.trim()) return word;
        return `<span class="word" style="display:inline-block; opacity:0;">${word}</span>`;
      }).join(' ');
    }).join('<br>');
    h1.innerHTML = htmlObj;
  }
  
  // Splash sequence
  const splash = document.getElementById('splash-screen');
  if (splash) {
    tl.to('.splash-logo', { 
      opacity: 1, scale: 1.1, duration: 0.6, ease: 'power3.out' 
    })
    .to('.splash-logo', {
      filter: 'blur(3px) drop-shadow(4px 0px 0px rgba(255,0,0,0.8)) drop-shadow(-4px 0px 0px rgba(0,0,255,0.8))',
      duration: 0.1, yoyo: true, repeat: 7, ease: "none"
    })
    .to('.splash-logo', {
      filter: 'blur(0px) drop-shadow(0px 0px 0px transparent)',
      duration: 0.2
    })
    .to('.splash-logo', {
      scale: 0.5, opacity: 0, duration: 0.3, ease: 'power2.in'
    })
    .to('#splash-screen', {
      opacity: 0, duration: 0.4, onComplete: () => {
        splash.style.display = 'none';
      }
    }, '-=0.1');
  }
  
  // Hero stagger reveal
  tl.to('.hero-content .word', {
    opacity: 1,
    filter: 'blur(0px)',
    y: 0,
    duration: 0.8,
    stagger: 0.05,
    ease: 'power3.out',
    startAt: { y: 20, filter: 'blur(10px)' }
  }, '-=0.2')
  .from('.hero-subtitle', { opacity: 0, y: 20, duration: 0.6 }, '-=0.4')
  .from('.hero-cta-row', { opacity: 0, y: 20, duration: 0.6 }, '-=0.4');
}

/* ═══════════════════════════════════════════
   GSAP SCROLL REVEALS
   ═══════════════════════════════════════════ */
function initGSAPScroll() {
  const reveals = gsap.utils.toArray('.reveal');
  reveals.forEach(rev => {
    gsap.set(rev, { visibility: 'visible', opacity: 0, y: 40 });
    
    ScrollTrigger.create({
      trigger: rev,
      start: 'top 85%',
      animation: gsap.to(rev, {
        opacity: 1,
        y: 0,
        duration: 0.8,
        ease: 'power3.out'
      }),
      toggleActions: 'play none none none'
    });
  });
}

/* ═══════════════════════════════════════════
   GSAP COUNTERS
   ═══════════════════════════════════════════ */
function initGSAPCounters() {
  const counters = document.querySelectorAll('.stat-number');
  
  counters.forEach(el => {
    const targetText = el.getAttribute('data-count');
    if (!targetText) return;
    const target = parseInt(targetText, 10);
    if (isNaN(target)) return;
    
    gsap.set(el, { visibility: 'visible' });

    ScrollTrigger.create({
      trigger: el,
      start: 'top 90%',
      onEnter: () => {
        el.classList.add('visible'); // Let CSS flip 3D happen
        
        let obj = { val: 0 };
        gsap.to(obj, {
          val: target,
          duration: 2,
          ease: 'power2.out',
          onUpdate: () => {
            const current = Math.round(obj.val);
            if (target >= 1000) {
              if (target % 1000 === 0) {
                el.innerText = (current / 1000).toFixed(1).replace('.0', '') + 'K+';
              } else {
                el.innerText = current.toLocaleString('en-IN') + '+';
              }
            } else {
              el.innerText = current.toLocaleString('en-IN') + '+';
            }
          },
          onComplete: () => {
            if (targetText === '5000') el.innerText = '5K+';
            else if (targetText === '10000') el.innerText = '10,000+';
            else el.innerText = target.toLocaleString('en-IN') + '+';
          }
        });
      },
      once: true
    });
  });
}

/* ═══════════════════════════════════════════
   PAGE TRANSITIONS (WIPE)
   ═══════════════════════════════════════════ */
function initPageTransitions() {
  const links = document.querySelectorAll('a[href="/register-employer"], a[href="/register-worker"], a.btn-back');
  
  links.forEach(link => {
    link.addEventListener('click', (e) => {
      if (e.ctrlKey || e.metaKey || e.shiftKey) return;
      
      e.preventDefault();
      const href = link.getAttribute('href');
      
      const wipe = document.getElementById('page-wipe');
      if (!wipe) { window.location.href = href; return; }
      
      gsap.to(wipe, {
        height: '100%',
        duration: 0.5,
        ease: 'power3.inOut',
        onComplete: () => {
          window.location.href = href;
        }
      });
    });
  });
}

/* ═══════════════════════════════════════════
   AJAX AUTHENTICATION FORMS
   ═══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  const workerForm = document.getElementById('workerSignupForm');
  const employerForm = document.getElementById('employerSignupForm');

  if (workerForm) {
    workerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const payload = {
        name: workerForm.querySelector('input[placeholder="Full Name"]').value,
        phone: workerForm.querySelector('input[placeholder="Phone Number"]').value,
        city: workerForm.querySelector('#city').value,
        skill: workerForm.querySelector('#skill').value,
        aadhaar: workerForm.querySelector('input[placeholder="Aadhaar Number (12 digits)"]').value,
        experience: workerForm.querySelector('input[type="number"]').value
      };

      const btn = workerForm.querySelector('button[type="submit"]');
      const originalText = btn.innerText;
      btn.innerText = "Registering...";
      btn.disabled = true;

      try {
        const res = await fetch(`${CONFIG.BACKEND_URL}/api/auth/register-worker`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        
        if (res.ok) {
          localStorage.setItem('kamgar-token', data.token);
          workerForm.innerHTML = `<h3 style="color:var(--orange-primary); text-align:center;">Signup Successful!</h3><p style="text-align:center;">Welcome to Kamgar Connect, ${data.user.name}</p>`;
        } else {
          alert('Signup failed: ' + (data.msg || (data.errors ? data.errors[0].msg : 'Unknown error')));
          btn.innerText = originalText;
          btn.disabled = false;
        }
      } catch (err) {
        alert("Network Error");
        btn.innerText = originalText;
        btn.disabled = false;
      }
    });
  }

  if (employerForm) {
    employerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const payload = {
        name: employerForm.querySelector('input[placeholder="Full Name"]').value,
        phone: employerForm.querySelector('input[placeholder="Phone Number"]').value,
        city: employerForm.querySelector('#city').value,
        companyName: employerForm.querySelector('input[placeholder="Company Name (Optional)"]').value
      };

      const btn = employerForm.querySelector('button[type="submit"]');
      const originalText = btn.innerText;
      btn.innerText = "Registering...";
      btn.disabled = true;

      try {
        const res = await fetch(`${CONFIG.BACKEND_URL}/api/auth/register-employer`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        
        if (res.ok) {
          localStorage.setItem('kamgar-token', data.token);
          employerForm.innerHTML = `<h3 style="color:var(--orange-primary); text-align:center;">Signup Successful!</h3><p style="text-align:center;">Welcome to Kamgar Connect, ${data.user.name}</p>`;
        } else {
          alert('Signup failed: ' + (data.msg || (data.errors ? data.errors[0].msg : 'Unknown error')));
          btn.innerText = originalText;
          btn.disabled = false;
        }
      } catch (err) {
        alert("Network Error");
        btn.innerText = originalText;
        btn.disabled = false;
      }
    });
  }
});
