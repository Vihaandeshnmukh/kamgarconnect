<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/config.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employer Registration — Kamgar Connect</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="js/translations.js"></script>
</head>
<body class="bg-dark">
  <div class="page-wipe" id="page-wipe"></div>
  
  <nav class="navbar scrolled">
    <div class="nav-inner">
      <a href="/" class="logo">
        <span class="logo-text">Kamgar<span class="logo-highlight">Connect</span></span>
      </a>
      <div class="lang-switcher" style="margin-right: 20px;">
        <button class="lang-btn-toggle" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn-toggle" onclick="setLanguage('hi')">हिं</button>
        <button class="lang-btn-toggle" onclick="setLanguage('mr')">मर</button>
      </div>
      <a href="/" class="btn-back" style="color: var(--text-secondary); font-size: 0.9rem;" data-t="back">← Back</a>
    </div>
  </nav>

  <section class="hero" style="min-height: 100vh; padding-top: 100px;">
    <div class="hero-bg-pattern"></div>
    <div class="hero-content reveal visible" style="max-width: 500px; text-align: left;">
      <h1 style="font-size: 2.2rem; margin-bottom: 10px;" data-t="reg_employer_title">Employer Registration</h1>
      <p style="color: var(--text-secondary); margin-bottom: 30px;" data-t="reg_employer_subtitle">Find the best verified workers in your city.</p>

      <form id="employerForm" class="contact-form">
        <div class="form-group">
          <label data-t="form_name">Full Name</label>
          <input type="text" id="name" data-t-placeholder="form_name_placeholder" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label data-t="form_company">Company / Home Name</label>
          <input type="text" id="company" data-t-placeholder="form_company_placeholder" placeholder="e.g. Patil Constructions or My Home" required>
        </div>

        <div class="form-group">
          <label data-t="form_phone">Mobile Number</label>
          <input type="tel" id="phone" data-t-placeholder="form_phone_placeholder" placeholder="10-digit mobile number" pattern="[0-9]{10}" required>
        </div>

        <div class="form-group">
          <label data-t="form_city">City</label>
          <select id="city" required>
            <option value="" data-t="Select City">Select City</option>
            <option value="Aurangabad">Aurangabad (Chhatrapati Sambhajinagar)</option>
            <option value="Nagpur">Nagpur</option>
            <option value="Pune">Pune</option>
            <option value="Nashik">Nashik</option>
            <option value="Mumbai">Mumbai</option>
          </select>
        </div>

        <div class="form-group">
          <label data-t="form_worker_type">Type of Worker Needed</label>
          <select id="workerType" required>
            <option value="" data-t="Select Skill">Select Skill</option>
            <option value="Mason">Mason</option>
            <option value="Electrician">Electrician</option>
            <option value="Plumber">Plumber</option>
            <option value="Domestic Help">Domestic Help</option>
            <option value="Factory Worker">Factory Worker</option>
            <option value="Carpenter">Carpenter</option>
            <option value="Painter">Painter</option>
            <option value="Driver">Driver</option>
          </select>
        </div>

        <div class="form-group">
          <label data-t="form_worker_count">Number of Workers Needed</label>
          <input type="number" id="workerCount" min="1" value="1" required>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn" style="margin-top: 20px;" data-t="btn_submit">
          Submit Registration
        </button>
      </form>

      <div id="successScreen" style="display: none; text-align: center; padding: 40px 0;">
        <div style="font-size: 4rem; margin-bottom: 20px;">🎉</div>
        <h2 style="color: var(--green); margin-bottom: 10px;" data-t="success_employer">Registration Successful!</h2>
        <p style="color: var(--text-secondary); line-height: 1.6;" data-t="success_desc_employer">We have saved your requirements. Our team will contact you shortly with available workers.</p>
        <a href="/" class="btn btn-outline" style="margin-top: 30px;" data-t="btn_home">Back to Home</a>
      </div>
    </div>
  </section>

  <script src="/js/sync.js"></script>
  <script>
    document.getElementById('employerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerText = 'Processing...';

      const data = {
        name: document.getElementById('name').value,
        companyName: document.getElementById('company').value,
        phone: document.getElementById('phone').value,
        city: document.getElementById('city').value,
        workerType: document.getElementById('workerType').value,
        workerCount: document.getElementById('workerCount').value
      };

      const executeSubmit = async () => {
        try {
          const response = await fetch(`${CONFIG.BACKEND_URL}/api/register/employer`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
          const result = await response.json();
          if (response.ok) {
            document.getElementById('employerForm').style.display = 'none';
            document.getElementById('successScreen').style.display = 'block';
          } else {
            alert('Error: ' + result.msg);
            submitBtn.disabled = false;
            submitBtn.innerText = 'Submit Registration';
          }
        } catch (err) {
          throw err;
        }
      };

      // Wrap in sync.js health checkpoint
      await checkHealthAndSubmit(executeSubmit, data, 'employer');
      if(document.getElementById('employerForm').style.display !== 'none') {
         submitBtn.disabled = false;
         submitBtn.innerText = 'Submit Registration';
      }
    });

    gsap.from('.hero-content', { opacity: 0, y: 30, duration: 1, ease: 'power3.out' });
  </script>

  <style>
    .bg-dark { background: var(--bg-base); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .form-group input, .form-group select { 
      width: 100%; 
      background: var(--bg-surface); 
      border: 1px solid var(--border); 
      border-radius: var(--radius-sm); 
      padding: 12px 16px; 
      color: white; 
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); outline: none; }
  </style>
</body>
</html>
